services:
  prometheus:
    image: prom/prometheus:v2.55.1
    profiles: ["monitoring"]
    # Reverse proxy : --web.external-url et --web.route-prefix passés en flags
    # CLI (Prometheus n'utilise pas d'env vars). Override via `.env` :
    #   PROMETHEUS_EXTERNAL_URL=https://healthai.chomizzz.fr/prometheus
    #   PROMETHEUS_ROUTE_PREFIX=/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --web.external-url=${PROMETHEUS_EXTERNAL_URL:-http://localhost:9090}
      - --web.route-prefix=${PROMETHEUS_ROUTE_PREFIX:-/}
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ../monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - app

  loki:
    image: grafana/loki:3.2.1
    profiles: ["monitoring"]
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "${LOKI_PORT:-3100}:3100"
    volumes:
      - ../monitoring/loki/loki-config.yaml:/etc/loki/local-config.yaml:ro
    networks:
      - app

  grafana:
    image: grafana/grafana:11.2.2
    profiles: ["monitoring"]
    environment:
      # Reverse proxy : override sur le serveur staging via `.env` :
      #   GF_SERVER_ROOT_URL=https://healthai.chomizzz.fr/grafana
      #   GF_SERVER_SERVE_FROM_SUB_PATH=true
      GF_SERVER_ROOT_URL: ${GF_SERVER_ROOT_URL:-http://localhost:3001}
      GF_SERVER_SERVE_FROM_SUB_PATH: ${GF_SERVER_SERVE_FROM_SUB_PATH:-false}
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ../monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - app

  promtail:
    image: grafana/promtail:3.2.1
    profiles: ["monitoring"]
    user: "0:0"
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - ../monitoring/promtail/promtail-config.yaml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - promtail_positions:/run/promtail
    depends_on:
      - loki
    networks:
      - app

networks:
  app:

volumes:
  grafana_data:
  promtail_positions:
