services:
  mspr_api:
    image: node:22-bookworm-slim
    profiles: ["services"]
    working_dir: /workspace
    command:
      - sh
      - -lc
      - ${MSPR_API_DEV_COMMAND:-if [ ! -d node_modules/.bin ]; then npm ci; fi && npm run start:dev}
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: "3000"
      HOST: 0.0.0.0
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
      KEYCLOAK_ISSUER: ${KEYCLOAK_ISSUER_INTERNAL:-http://keycloak:8080/realms/mspr}
      KEYCLOAK_AUDIENCE: ${KEYCLOAK_AUDIENCE_API:-mspr-api}
      DATABASE_URL: ${API_DATABASE_URL:-postgresql://api:change-me@postgres_api:5432/api}
    volumes:
      - ${MSPR_API_SOURCE_DIR:-../mspr-api}:/workspace
      - mspr_api_node_modules:/workspace/node_modules
    depends_on:
      - postgres_api
      - keycloak
    networks:
      - app

  mspr_tracking:
    image: node:22-bookworm-slim
    profiles: ["services"]
    working_dir: /workspace
    command:
      - sh
      - -lc
      - ${MSPR_TRACKING_DEV_COMMAND:-if [ ! -d node_modules/.bin ]; then npm ci; fi && npm run start:dev}
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: "3000"
      HOST: 0.0.0.0
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
      KEYCLOAK_ISSUER: ${KEYCLOAK_ISSUER_INTERNAL:-http://keycloak:8080/realms/mspr}
      KEYCLOAK_AUDIENCE: ${KEYCLOAK_AUDIENCE_TRACKING:-mspr-tracking}
      DATABASE_URL: ${TRACKING_DATABASE_URL:-postgresql://tracking:change-me@postgres_tracking:5432/tracking}
    volumes:
      - ${MSPR_TRACKING_SOURCE_DIR:-../mspr-tracking}:/workspace
      - mspr_tracking_node_modules:/workspace/node_modules
    depends_on:
      - postgres_tracking
      - keycloak
    networks:
      - app

  mspr_data:
    image: node:22-bookworm-slim
    profiles: ["services"]
    working_dir: /workspace
    command:
      - sh
      - -lc
      - ${MSPR_DATA_DEV_COMMAND:-if [ ! -d node_modules/.bin ]; then npm ci; fi && npm run start:dev}
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: "3000"
      HOST: 0.0.0.0
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
      KEYCLOAK_ISSUER: ${KEYCLOAK_ISSUER_INTERNAL:-http://keycloak:8080/realms/mspr}
      KEYCLOAK_AUDIENCE: ${KEYCLOAK_AUDIENCE_DATA:-mspr-data}
      DATABASE_URL: ${DATA_DATABASE_URL:-postgresql://data:change-me@postgres_data:5432/data}
    volumes:
      - ${MSPR_DATA_SOURCE_DIR:-../mspr-data}:/workspace
      - mspr_data_node_modules:/workspace/node_modules
    depends_on:
      - postgres_data
      - keycloak
    networks:
      - app

networks:
  app:

volumes:
  mspr_api_node_modules:
  mspr_tracking_node_modules:
  mspr_data_node_modules:
