services:
  nginx:
    image: nginx:1.27-alpine
    profiles: ["core"]
    ports:
      - "${GATEWAY_PORT:-8080}:80"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../nginx/conf.d:/etc/nginx/conf.d:ro
      - ../nginx/snippets:/etc/nginx/snippets:ro
      - ../nginx/static:/etc/nginx/static:ro
    depends_on:
      - keycloak
    networks:
      - app

  postgres_keycloak:
    image: postgres:16
    profiles: ["core"]
    environment:
      POSTGRES_DB: ${KC_POSTGRES_DB:-keycloak}
      POSTGRES_USER: ${KC_POSTGRES_USER:-keycloak}
      POSTGRES_PASSWORD: ${KC_POSTGRES_PASSWORD:-change-me}
    volumes:
      - pgdata_keycloak:/var/lib/postgresql/data
    networks:
      - app

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    profiles: ["core"]
    command: ["start-dev", "--import-realm"] # Added import-realm if you want to use that JSON automatically
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres_keycloak:5432/${KC_POSTGRES_DB:-keycloak}
      KC_DB_USERNAME: ${KC_POSTGRES_USER:-keycloak}
      KC_DB_PASSWORD: ${KC_POSTGRES_PASSWORD:-change-me}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}

      KC_PROXY_HEADERS: xforwarded # Ensures Keycloak respects X-Forwarded-* headers from Nginx
      KC_HTTP_RELATIVE_PATH: /auth # Essential for /auth prefix
      KC_HTTP_ENABLED: "true"

      KC_HOSTNAME_PATH: /auth
      KC_HOSTNAME: localhost
      KC_HOSTNAME_PORT: 8080
      KC_HOSTNAME_STRICT: "false"

    volumes:
      - ../keycloak/realm:/opt/keycloak/data/import:ro
    depends_on:
      - postgres_keycloak
    expose:
      - "8080"
    networks:
      - app

networks:
  app:

volumes:
  pgdata_keycloak:
