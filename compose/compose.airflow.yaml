services:
  postgres_airflow:
    image: postgres:16
    profiles: ["airflow"]
    environment:
      POSTGRES_DB: ${AIRFLOW_POSTGRES_DB:-airflow}
      POSTGRES_USER: ${AIRFLOW_POSTGRES_USER:-airflow}
      POSTGRES_PASSWORD: ${AIRFLOW_POSTGRES_PASSWORD:-change-me}
    volumes:
      - pgdata_airflow:/var/lib/postgresql/data
    networks:
      - app

  airflow-init:
    image: apache/airflow:2.9.3
    profiles: ["airflow"]
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_POSTGRES_USER:-airflow}:${AIRFLOW_POSTGRES_PASSWORD:-change-me}@postgres_airflow:5432/${AIRFLOW_POSTGRES_DB:-airflow}
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    command: >
      bash -c "airflow db migrate &&
      airflow users create
      --username ${AIRFLOW_ADMIN_USER:-admin}
      --password ${AIRFLOW_ADMIN_PASSWORD:-admin}
      --firstname MSPR
      --lastname Admin
      --role Admin
      --email admin@local.dev"
    volumes:
      - ../airflow/dags:/opt/airflow/dags
      - ../airflow/plugins:/opt/airflow/plugins
      - ../airflow/requirements.txt:/opt/airflow/requirements.txt:ro
      - ../deep-data/datasets:/opt/airflow/datasets:ro
    depends_on:
      - postgres_airflow
    networks:
      - app

  airflow-webserver:
    image: apache/airflow:2.9.3
    profiles: ["airflow"]
    command: >
      bash -c "pip install --no-cache-dir -r /opt/airflow/requirements.txt || true;
      airflow webserver"
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_POSTGRES_USER:-airflow}:${AIRFLOW_POSTGRES_PASSWORD:-change-me}@postgres_airflow:5432/${AIRFLOW_POSTGRES_DB:-airflow}
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      # Doit être identique entre webserver et scheduler — sinon le webserver
      # ne peut pas lire les logs servis par le scheduler (HTTP 403).
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY:-mspr-healthbook-dev-key-change-in-prod}
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: "9000"
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-change-me}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-admin}
      # dump.py attend ACCESS_KEY/SECRET_KEY ; on alias depuis ROOT_USER/PASSWORD.
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-admin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-admin}
      MINIO_BUCKET: lake
      TRACKING_API_URL: http://tracking-api:3000
      RECOMMENDATION_API_URL: http://data-recommendation-api:3000
      RECOMMENDATION_DB_URL: postgresql://${DATA_POSTGRES_USER:-data}:${DATA_POSTGRES_PASSWORD:-change-me}@postgres_data:5432/${DATA_POSTGRES_DB:-data}
      # Variables ClickHouse pour le DAG d'entraînement (cf. healthbook_ml.data).
      CH_HOST: clickhouse
      CH_PORT: "8123"
      CH_USER: default
      CH_PASSWORD: ${CLICKHOUSE_PASSWORD:-change-me}
      CH_DATABASE: workout_session
    ports:
      - "${AIRFLOW_PORT:-8081}:8080"
    volumes:
      - ../airflow/dags:/opt/airflow/dags
      - ../airflow/plugins:/opt/airflow/plugins
      - ../airflow/scripts:/opt/airflow/scripts:ro
      - ../airflow/requirements.txt:/opt/airflow/requirements.txt:ro
      - ../deep-data/datasets:/opt/airflow/datasets:ro
      # ml/exercise/ monté en lecture-écriture pour permettre au DAG d'entraînement
      # d'écrire `model/latest.joblib`, lu en read-only par le container FastAPI.
      - ../../healthai-brain-api/ml/exercise:/opt/airflow/ml_exercise
    depends_on:
      - airflow-init
    networks:
      - app

  airflow-scheduler:
    image: apache/airflow:2.9.3
    profiles: ["airflow"]
    command: >
      bash -c "pip install --no-cache-dir -r /opt/airflow/requirements.txt || true;
      airflow scheduler"
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_POSTGRES_USER:-airflow}:${AIRFLOW_POSTGRES_PASSWORD:-change-me}@postgres_airflow:5432/${AIRFLOW_POSTGRES_DB:-airflow}
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      # Idem webserver — clé partagée pour permettre la lecture des logs.
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY:-mspr-healthbook-dev-key-change-in-prod}
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: "9000"
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-change-me}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-change-me}
      # dump.py attend ACCESS_KEY/SECRET_KEY ; on alias depuis ROOT_USER/PASSWORD.
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-change-me}
      MINIO_BUCKET: lake
      TRACKING_API_URL: http://tracking-api:3000
      RECOMMENDATION_API_URL: http://data-recommendation-api:3000
      RECOMMENDATION_DB_URL: postgresql://${DATA_POSTGRES_USER:-data}:${DATA_POSTGRES_PASSWORD:-change-me}@postgres_data:5432/${DATA_POSTGRES_DB:-data}
      # Variables ClickHouse pour le DAG d'entraînement (cf. healthbook_ml.data).
      CH_HOST: clickhouse
      CH_PORT: "8123"
      CH_USER: default
      CH_PASSWORD: ${CLICKHOUSE_PASSWORD:-change-me}
      CH_DATABASE: workout_session
    volumes:
      - ../airflow/dags:/opt/airflow/dags
      - ../airflow/plugins:/opt/airflow/plugins
      - ../airflow/scripts:/opt/airflow/scripts:ro
      - ../airflow/requirements.txt:/opt/airflow/requirements.txt:ro
      - ../deep-data/datasets:/opt/airflow/datasets:ro
      # ml/exercise/ monté en lecture-écriture (le scheduler exécute le DAG train).
      - ../../healthai-brain-api/ml/exercise:/opt/airflow/ml_exercise
    depends_on:
      - airflow-init
    networks:
      - app

networks:
  app:

volumes:
  pgdata_airflow:
