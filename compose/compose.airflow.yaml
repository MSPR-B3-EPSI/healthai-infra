services:
  postgres_airflow:
    image: postgres:16
    profiles: ["airflow"]
    environment:
      POSTGRES_DB: ${AIRFLOW_POSTGRES_DB:-airflow}
      POSTGRES_USER: ${AIRFLOW_POSTGRES_USER:-airflow}
      POSTGRES_PASSWORD: ${AIRFLOW_POSTGRES_PASSWORD:-change-me}
    volumes:
      - pgdata_airflow:/var/lib/postgresql/data
    networks:
      - app

  airflow-init:
    # Image custom : Airflow + postgresql-client (pour `pg_dump` dans le DAG backup).
    # `docker compose build` construit une fois ; les 3 services Airflow partagent
    # la même image taggée `healthai-airflow:custom`.
    build:
      context: ../airflow
      dockerfile: Dockerfile
    image: healthai-airflow:custom
    profiles: ["airflow"]
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_POSTGRES_USER:-airflow}:${AIRFLOW_POSTGRES_PASSWORD:-change-me}@postgres_airflow:5432/${AIRFLOW_POSTGRES_DB:-airflow}
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    command: >
      bash -c "airflow db migrate &&
      airflow users create
      --username ${AIRFLOW_ADMIN_USER:-admin}
      --password ${AIRFLOW_ADMIN_PASSWORD:-admin}
      --firstname MSPR
      --lastname Admin
      --role Admin
      --email admin@local.dev"
    volumes:
      - ../airflow/dags:/opt/airflow/dags
      - ../airflow/plugins:/opt/airflow/plugins
      - ../airflow/requirements.txt:/opt/airflow/requirements.txt:ro
      - ../deep-data/datasets:/opt/airflow/datasets:ro
    depends_on:
      - postgres_airflow
    networks:
      - app

  airflow-webserver:
    image: healthai-airflow:custom
    profiles: ["airflow"]
    command: >
      bash -c "pip install --no-cache-dir -r /opt/airflow/requirements.txt || true;
      airflow webserver"
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_POSTGRES_USER:-airflow}:${AIRFLOW_POSTGRES_PASSWORD:-change-me}@postgres_airflow:5432/${AIRFLOW_POSTGRES_DB:-airflow}
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      # Reverse proxy : à override sur le serveur staging via `.env`.
      # En dev local on garde http://localhost:8081 (BASE_URL inutile mais cohérent).
      AIRFLOW__WEBSERVER__BASE_URL: ${AIRFLOW_BASE_URL:-http://localhost:8081}
      AIRFLOW__WEBSERVER__ENABLE_PROXY_FIX: ${AIRFLOW_ENABLE_PROXY_FIX:-False}
      # Doit être identique entre webserver et scheduler — sinon le webserver
      # ne peut pas lire les logs servis par le scheduler (HTTP 403).
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY:-mspr-healthbook-dev-key-change-in-prod}
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: "9000"
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-change-me}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-change-me}
      # dump.py attend ACCESS_KEY/SECRET_KEY ; on alias depuis ROOT_USER/PASSWORD.
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-change-me}
      MINIO_BUCKET: lake
      TRACKING_API_URL: http://tracking-api:3000
      RECOMMENDATION_API_URL: http://data-recommendation-api:3000
      RECOMMENDATION_DB_URL: postgresql://${DATA_POSTGRES_USER:-data}:${DATA_POSTGRES_PASSWORD:-change-me}@postgres_data:5432/${DATA_POSTGRES_DB:-data}
    ports:
      - "${AIRFLOW_PORT:-8081}:8080"
    volumes:
      - ../airflow/dags:/opt/airflow/dags
      - ../airflow/plugins:/opt/airflow/plugins
      - ../airflow/scripts:/opt/airflow/scripts:ro
      - ../airflow/requirements.txt:/opt/airflow/requirements.txt:ro
      - ../deep-data/datasets:/opt/airflow/datasets:ro
    depends_on:
      - airflow-init
    networks:
      - app

  airflow-scheduler:
    image: healthai-airflow:custom
    profiles: ["airflow"]
    # Le user `airflow` (UID 50000) doit appartenir au groupe `docker` du host
    # pour pouvoir parler au socket monté. Le GID varie selon l'host — défaut
    # `962` (Arch). Override possible via `DOCKER_GID=<gid>` dans `.env`.
    group_add:
      - "${DOCKER_GID:-962}"
    command: >
      bash -c "pip install --no-cache-dir -r /opt/airflow/requirements.txt || true;
      airflow scheduler"
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_POSTGRES_USER:-airflow}:${AIRFLOW_POSTGRES_PASSWORD:-change-me}@postgres_airflow:5432/${AIRFLOW_POSTGRES_DB:-airflow}
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      # Idem webserver — cohérence pour la génération de liens internes.
      AIRFLOW__WEBSERVER__BASE_URL: ${AIRFLOW_BASE_URL:-http://localhost:8081}
      AIRFLOW__WEBSERVER__ENABLE_PROXY_FIX: ${AIRFLOW_ENABLE_PROXY_FIX:-False}
      # Idem webserver — clé partagée pour permettre la lecture des logs.
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY:-mspr-healthbook-dev-key-change-in-prod}
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: "9000"
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-change-me}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-change-me}
      # dump.py attend ACCESS_KEY/SECRET_KEY ; on alias depuis ROOT_USER/PASSWORD.
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-change-me}
      MINIO_BUCKET: lake
      TRACKING_API_URL: http://tracking-api:3000
      RECOMMENDATION_API_URL: http://data-recommendation-api:3000
      RECOMMENDATION_DB_URL: postgresql://${DATA_POSTGRES_USER:-data}:${DATA_POSTGRES_PASSWORD:-change-me}@postgres_data:5432/${DATA_POSTGRES_DB:-data}
      # Credentials Postgres pour le DAG `backup_dbs_to_lake` (pg_dump).
      API_POSTGRES_USER: ${API_POSTGRES_USER:-api}
      API_POSTGRES_PASSWORD: ${API_POSTGRES_PASSWORD:-change-me}
      API_POSTGRES_DB: ${API_POSTGRES_DB:-api}
      TRACKING_POSTGRES_USER: ${TRACKING_POSTGRES_USER:-tracking}
      TRACKING_POSTGRES_PASSWORD: ${TRACKING_POSTGRES_PASSWORD:-change-me}
      TRACKING_POSTGRES_DB: ${TRACKING_POSTGRES_DB:-tracking}
      KC_POSTGRES_USER: ${KC_POSTGRES_USER:-keycloak}
      KC_POSTGRES_PASSWORD: ${KC_POSTGRES_PASSWORD:-change-me}
      KC_POSTGRES_DB: ${KC_POSTGRES_DB:-keycloak}
    volumes:
      - ../airflow/dags:/opt/airflow/dags
      - ../airflow/plugins:/opt/airflow/plugins
      - ../airflow/scripts:/opt/airflow/scripts:ro
      - ../airflow/requirements.txt:/opt/airflow/requirements.txt:ro
      - ../deep-data/datasets:/opt/airflow/datasets:ro
      # Le DAG `train_exercise_duration_model` invoque `docker exec` sur le
      # container FastAPI. On expose le socket + binaire Docker du host.
      # Pattern "docker-in-docker lite" pour le POC ; migration future possible
      # vers `DockerOperator` (apache-airflow-providers-docker).
      - /var/run/docker.sock:/var/run/docker.sock
      - /usr/bin/docker:/usr/bin/docker:ro
    depends_on:
      - airflow-init
    networks:
      - app

networks:
  app:

volumes:
  pgdata_airflow:
