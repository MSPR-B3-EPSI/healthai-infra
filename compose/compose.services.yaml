services:
  healthbook-api:
    image: node:22-bookworm-slim
    profiles: ["services"]
    working_dir: /workspace
    command:
      - sh
      - -lc
      - ${MSPR_API_DEV_COMMAND:-if [ ! -d node_modules/.bin ]; then npm install; fi && npx prisma generate && npx prisma migrate deploy && exec node_modules/.bin/nest start --watch}
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: "3000"
      HOST: 0.0.0.0
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"

      KEYCLOAK_ISSUER: ${KEYCLOAK_ISSUER_EXTERNAL:-http://${KEYCLOAK_HOSTNAME:-localhost}:${GATEWAY_PORT:-8080}/auth/realms/${KEYCLOAK_REALM:-healthai}}
      KEYCLOAK_JWKS_URI: ${KEYCLOAK_ISSUER_INTERNAL:-http://keycloak:8080/auth/realms/healthai}/protocol/openid-connect/certs
      KEYCLOAK_AUDIENCE: ${KEYCLOAK_AUDIENCE_API:-healthbook-api}
      DATABASE_URL: ${API_DATABASE_URL:-postgresql://api:change-me@postgres_api:5432/api}
    volumes:
      - ${MSPR_API_SOURCE_DIR:-../../healthbook-api}:/workspace
      - ${MSPR_API_SOURCE_DIR:-../../healthbook-api}/node_modules:/workspace/node_modules
    depends_on:
      - postgres_api
      - keycloak
    networks:
      - app

  tracking-api:
    image: node:22-bookworm-slim
    profiles: ["services"]
    working_dir: /workspace
    command:
      - sh
      - -lc
      - ${MSPR_TRACKING_DEV_COMMAND:-if [ ! -d node_modules/.bin ]; then npm install; fi && npx prisma generate && npx prisma migrate deploy && exec node_modules/.bin/nest start --watch}
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: "3001"
      HOST: 0.0.0.0
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
      # Issuer that must match the `iss` claim of incoming JWTs. Derived from KEYCLOAK_HOSTNAME
      # so it stays in sync with whatever URL Keycloak emits. Override with KEYCLOAK_ISSUER_EXTERNAL
      # only for advanced cases (e.g. HTTPS reverse-proxy with different external hostname).
      KEYCLOAK_ISSUER: ${KEYCLOAK_ISSUER_EXTERNAL:-http://${KEYCLOAK_HOSTNAME:-localhost}:${GATEWAY_PORT:-8080}/auth/realms/${KEYCLOAK_REALM:-healthai}}
      KEYCLOAK_JWKS_URI: ${KEYCLOAK_ISSUER_INTERNAL:-http://keycloak:8080/auth/realms/healthai}/protocol/openid-connect/certs
      KEYCLOAK_AUDIENCE: ${KEYCLOAK_AUDIENCE_TRACKING:-tracking-api}
      DATABASE_URL: ${TRACKING_DATABASE_URL:-postgresql://tracking:change-me@postgres_tracking:5432/tracking}
    volumes:
      - ${MSPR_TRACKING_SOURCE_DIR:-../../tracking-api}:/workspace
      - ${MSPR_TRACKING_SOURCE_DIR:-../../tracking-api}/node_modules:/workspace/node_modules
    depends_on:
      - postgres_tracking
      - keycloak
    networks:
      - app

  data-recommendation-api:
    image: node:22-bookworm-slim
    profiles: ["services"]
    working_dir: /workspace
    command:
      - sh
      - -lc
      - ${MSPR_DATA_DEV_COMMAND:-if [ ! -d node_modules/.bin ]; then npm install; fi && npx prisma generate && npx prisma migrate deploy && exec node_modules/.bin/nest start --watch}
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: "3002"
      HOST: 0.0.0.0
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
      # Issuer that must match the `iss` claim of incoming JWTs. Derived from KEYCLOAK_HOSTNAME
      # so it stays in sync with whatever URL Keycloak emits. Override with KEYCLOAK_ISSUER_EXTERNAL
      # only for advanced cases (e.g. HTTPS reverse-proxy with different external hostname).
      KEYCLOAK_ISSUER: ${KEYCLOAK_ISSUER_EXTERNAL:-http://${KEYCLOAK_HOSTNAME:-localhost}:${GATEWAY_PORT:-8080}/auth/realms/${KEYCLOAK_REALM:-healthai}}
      KEYCLOAK_JWKS_URI: ${KEYCLOAK_ISSUER_INTERNAL:-http://keycloak:8080/auth/realms/healthai}/protocol/openid-connect/certs
      KEYCLOAK_AUDIENCE: ${KEYCLOAK_AUDIENCE_DATA:-data-recommendation-api}
      DATABASE_URL: ${DATA_DATABASE_URL:-postgresql://data:change-me@postgres_data:5432/data}
    volumes:
      - ${MSPR_DATA_SOURCE_DIR:-../../data-recommendation-api}:/workspace
      - ${MSPR_DATA_SOURCE_DIR:-../../data-recommendation-api}/node_modules:/workspace/node_modules
    depends_on:
      - postgres_data
      - keycloak
    networks:
      - app

networks:
  app:

volumes: {}
