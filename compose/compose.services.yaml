services:
  healthbook-api:
    image: node:22-bookworm-slim
    profiles: ["services"]
    working_dir: /workspace
    command:
      - sh
      - -lc
      - ${MSPR_API_DEV_COMMAND:-if [ ! -d node_modules/.bin ]; then npm install; fi && npx prisma generate && npx prisma db push && exec node_modules/.bin/nest start --watch}
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: "3000"
      HOST: 0.0.0.0
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
      KEYCLOAK_ISSUER: ${KEYCLOAK_ISSUER_EXTERNAL:-http://localhost:8080/auth/realms/healthai}
      KEYCLOAK_JWKS_URI: ${KEYCLOAK_ISSUER_INTERNAL:-http://keycloak:8080/auth/realms/healthai}/protocol/openid-connect/certs
      KEYCLOAK_AUDIENCE: ${KEYCLOAK_AUDIENCE_API:-healthbook-api}
      DATABASE_URL: ${API_DATABASE_URL:-postgresql://api:change-me@postgres_api:5432/api}
      # MinIO — media upload pour les posts.
      # PUBLIC_ENDPOINT = ingress nginx (les URLs présignées sont servies via
      # le reverse proxy, pas via le port MinIO direct). La signature SigV4
      # couvre cet host, donc il doit correspondre à ce que le client appelle.
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-http://minio:9000}
      MINIO_PUBLIC_ENDPOINT: ${MINIO_PUBLIC_ENDPOINT_API:-http://localhost:8080}
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-change-me}
      MINIO_BUCKET: ${HEALTHBOOK_MINIO_BUCKET:-healthbook}
    volumes:
      - ${MSPR_API_SOURCE_DIR:-../../healthbook-api}:/workspace
      - ${MSPR_API_SOURCE_DIR:-../../healthbook-api}/node_modules:/workspace/node_modules
    depends_on:
      - postgres_api
      - keycloak
    networks:
      - app

  tracking-api:
    image: node:22-bookworm-slim
    profiles: ["services"]
    working_dir: /workspace
    command:
      - sh
      - -lc
      - ${MSPR_TRACKING_DEV_COMMAND:-if [ ! -d node_modules/.bin ]; then npm install; fi && npx prisma generate && npx prisma db push && exec node_modules/.bin/nest start --watch}
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: "3001"
      HOST: 0.0.0.0
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
      KEYCLOAK_ISSUER: ${KEYCLOAK_ISSUER_EXTERNAL:-http://localhost:8080/auth/realms/healthai}
      KEYCLOAK_JWKS_URI: ${KEYCLOAK_ISSUER_INTERNAL:-http://keycloak:8080/auth/realms/healthai}/protocol/openid-connect/certs
      KEYCLOAK_AUDIENCE: ${KEYCLOAK_AUDIENCE_TRACKING:-tracking-api}
      DATABASE_URL: ${TRACKING_DATABASE_URL:-postgresql://tracking:change-me@postgres_tracking:5432/tracking}
    volumes:
      - ${MSPR_TRACKING_SOURCE_DIR:-../../tracking-api}:/workspace
      - ${MSPR_TRACKING_SOURCE_DIR:-../../tracking-api}/node_modules:/workspace/node_modules
    depends_on:
      - postgres_tracking
      - keycloak
    networks:
      - app

  data-recommendation-api:
    image: node:22-bookworm-slim
    profiles: ["services"]
    working_dir: /workspace
    command:
      - sh
      - -lc
      - ${MSPR_DATA_DEV_COMMAND:-if [ ! -d node_modules/.bin ]; then npm install; fi && npx prisma generate && npx prisma db push && exec node_modules/.bin/nest start --watch}
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: "3002"
      HOST: 0.0.0.0
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
      KEYCLOAK_ISSUER: ${KEYCLOAK_ISSUER_EXTERNAL:-http://localhost:8080/auth/realms/healthai}
      KEYCLOAK_JWKS_URI: ${KEYCLOAK_ISSUER_INTERNAL:-http://keycloak:8080/auth/realms/healthai}/protocol/openid-connect/certs
      KEYCLOAK_AUDIENCE: ${KEYCLOAK_AUDIENCE_DATA:-data-recommendation-api}
      DATABASE_URL: ${DATA_DATABASE_URL:-postgresql://data:change-me@postgres_data:5432/data}
    volumes:
      - ${MSPR_DATA_SOURCE_DIR:-../../data-recommendation-api}:/workspace
      - ${MSPR_DATA_SOURCE_DIR:-../../data-recommendation-api}/node_modules:/workspace/node_modules
    depends_on:
      - postgres_data
      - keycloak
    networks:
      - app

  healthai-brain-nest-api:
    image: node:22-bookworm-slim
    profiles: ["services"]
    working_dir: /workspace
    command:
      - sh
      - -lc
      - ${MSPR_BRAIN_DEV_COMMAND:-if [ ! -d node_modules/.bin ]; then npm install; fi && npx prisma generate && npx prisma db push && exec node_modules/.bin/nest start --watch}
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: "3003"
      HOST: 0.0.0.0
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
      KEYCLOAK_ISSUER: ${KEYCLOAK_ISSUER_EXTERNAL:-http://localhost:8080/auth/realms/healthai}
      KEYCLOAK_JWKS_URI: ${KEYCLOAK_ISSUER_INTERNAL:-http://keycloak:8080/auth/realms/healthai}/protocol/openid-connect/certs
      KEYCLOAK_AUDIENCE: ${KEYCLOAK_AUDIENCE_BRAIN:-healthai-brain-api}
      DATABASE_URL: ${BRAIN_DATABASE_URL:-postgresql://brain:change-me@postgres_brain:5432/brain}
      AI_SERVICE_URL: ${BRAIN_AI_SERVICE_URL:-http://healthai-brain-fastapi-api:8000}
    volumes:
      - ${MSPR_BRAIN_NEST_SOURCE_DIR:-../../healthai-brain-api/exposed-nest-api}:/workspace
      - ${MSPR_BRAIN_NEST_SOURCE_DIR:-../../healthai-brain-api/exposed-nest-api}/node_modules:/workspace/node_modules
    depends_on:
      - postgres_brain
      - keycloak
      - healthai-brain-fastapi-api
    networks:
      - app

  healthai-brain-fastapi-api:
    image: python:3.11-slim
    profiles: ["services"]
    working_dir: /workspace
    command:
      - sh
      - -lc
      - ${MSPR_BRAIN_FASTAPI_DEV_COMMAND:-if [ ! -f .venv/bin/uvicorn ]; then python -m venv .venv && .venv/bin/pip install -r requirements.txt; fi && exec .venv/bin/uvicorn main:app --host 0.0.0.0 --port 8000 --reload}
    environment:
      HF_HOME: /hf-cache
      # MinIO — fallback download du modèle si absent du volume + upload par train.py
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-change-me}
      MINIO_BUCKET: lake
      # ClickHouse — utilisé par `scripts/train.py` (load_sessions) au réentraînement
      CH_HOST: clickhouse
      CH_PORT: "8123"
      CH_USER: default
      CH_PASSWORD: ${CLICKHOUSE_PASSWORD:-change-me}
      CH_DATABASE: workout_session
    volumes:
      - ${MSPR_BRAIN_FASTAPI_SOURCE_DIR:-../../healthai-brain-api/hidden-fastapi}:/workspace
      # Volume modèle (RW) : train.py écrit dedans (déclenché par Airflow via docker exec),
      # FastAPI lit au boot. Si vide, fallback download depuis MinIO (cf. exercise/service.py).
      - ${MSPR_ML_EXERCISE_MODEL_DIR:-../../healthai-brain-api/ml/exercise/model}:/workspace/model
      - brain_venv:/workspace/.venv
      - brain_hf_cache:/hf-cache
    networks:
      - app

networks:
  app:

volumes:
  brain_venv:
  brain_hf_cache:
