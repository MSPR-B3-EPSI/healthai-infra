services:
  mspr_api:
    image: ${MSPR_API_IMAGE:-ghcr.io/your-org/mspr-api:latest}
    profiles: ["services"]
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: "3000"
      KEYCLOAK_ISSUER: ${KEYCLOAK_ISSUER_INTERNAL:-http://keycloak:8080/realms/mspr}
      KEYCLOAK_AUDIENCE: ${KEYCLOAK_AUDIENCE_API:-mspr-api}
      DATABASE_URL: ${API_DATABASE_URL:-postgresql://api:change-me@postgres_api:5432/api}
    expose:
      - "3000"
    depends_on:
      - postgres_api
      - keycloak
    networks:
      - app

  mspr_tracking:
    image: ${MSPR_TRACKING_IMAGE:-ghcr.io/your-org/mspr-tracking:latest}
    profiles: ["services"]
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: "3000"
      KEYCLOAK_ISSUER: ${KEYCLOAK_ISSUER_INTERNAL:-http://keycloak:8080/realms/mspr}
      KEYCLOAK_AUDIENCE: ${KEYCLOAK_AUDIENCE_TRACKING:-mspr-tracking}
      DATABASE_URL: ${TRACKING_DATABASE_URL:-postgresql://tracking:change-me@postgres_tracking:5432/tracking}
    expose:
      - "3000"
    depends_on:
      - postgres_tracking
      - keycloak
    networks:
      - app

  mspr_data:
    image: ${MSPR_DATA_IMAGE:-ghcr.io/your-org/mspr-data:latest}
    profiles: ["services"]
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: "3000"
      KEYCLOAK_ISSUER: ${KEYCLOAK_ISSUER_INTERNAL:-http://keycloak:8080/realms/mspr}
      KEYCLOAK_AUDIENCE: ${KEYCLOAK_AUDIENCE_DATA:-mspr-data}
      DATABASE_URL: ${DATA_DATABASE_URL:-postgresql://data:change-me@postgres_data:5432/data}
    expose:
      - "3000"
    depends_on:
      - postgres_data
      - keycloak
    networks:
      - app
