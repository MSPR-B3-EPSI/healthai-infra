location /auth/ {
    proxy_http_version 1.1;

    # Keycloak is configured with KC_HOSTNAME/KC_HOSTNAME_PORT/KC_HOSTNAME_PATH.
    # Forwarding X-Forwarded-* here caused it to generate URLs without the external :8080,
    # so keep headers minimal and let Keycloak's hostname config drive absolute URLs.
    proxy_set_header Host $http_host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

    proxy_set_header X-Forwarded-Prefix /auth;
    
    proxy_buffering off;

    proxy_redirect off;

    proxy_pass http://keycloak:8080/auth/;
}