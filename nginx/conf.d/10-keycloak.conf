location /auth/ {
  include /etc/nginx/snippets/proxy_headers.conf;
  proxy_http_version 1.1;
  proxy_set_header X-Forwarded-Port $server_port;
  proxy_set_header X-Forwarded-Prefix /auth;
  proxy_buffering off;
  proxy_cookie_path / /auth/;
  proxy_redirect ~^https?://[^/]+(/.*)$ $scheme://$http_host/auth$1;
  proxy_redirect / /auth/;
  proxy_pass http://keycloak:8080/;
}

# Keycloak admin pages may reference absolute root paths.
location ^~ /admin/ {
  include /etc/nginx/snippets/proxy_headers.conf;
  proxy_http_version 1.1;
  proxy_buffering off;
  proxy_pass http://keycloak:8080/admin/;
}

location ^~ /realms/ {
  include /etc/nginx/snippets/proxy_headers.conf;
  proxy_http_version 1.1;
  proxy_buffering off;
  proxy_pass http://keycloak:8080/realms/;
}

location ^~ /resources/ {
  include /etc/nginx/snippets/proxy_headers.conf;
  proxy_http_version 1.1;
  proxy_buffering off;
  proxy_pass http://keycloak:8080/resources/;
}
