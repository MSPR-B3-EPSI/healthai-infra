# Nginx configuration for HealthAI services

# Aggregated Swagger UI
location = /docs {
    return 301 $scheme://$http_host/docs/;
}

location = /docs/ {
    root /etc/nginx/static;
    try_files /docs.html =404;
}

location = /health {
    add_header Content-Type text/plain;
    return 200 "ok\n";
}

# Healthbook API
location = /api {
    return 301 $scheme://$http_host/api/;
}

location /api/ {
    include /etc/nginx/snippets/proxy_headers.conf;
    proxy_http_version 1.1;

    # Use runtime DNS resolution (Docker service IPs can change).
    set $api_upstream http://healthbook-api:3000;
    rewrite ^/api/(.*)$ /$1 break;
    proxy_pass $api_upstream;
    
    proxy_set_header X-Forwarded-Prefix /api;
}

# Tracking API
location = /tracking {
    return 301 $scheme://$http_host/tracking/;
}

location /tracking/ {
    include /etc/nginx/snippets/proxy_headers.conf;
    proxy_http_version 1.1;

    # Use runtime DNS resolution (Docker service IPs can change).
    set $tracking_upstream http://tracking-api:3001;
    rewrite ^/tracking/(.*)$ /$1 break;
    proxy_pass $tracking_upstream;
    proxy_set_header X-Forwarded-Prefix /tracking;
}

# Data Recommendation API
location = /data {
    return 301 $scheme://$http_host/data/;
}

location /data/ {
    include /etc/nginx/snippets/proxy_headers.conf;
    proxy_http_version 1.1;

    # Use runtime DNS resolution (Docker service IPs can change).
    set $data_upstream http://data-recommendation-api:3002;
    rewrite ^/data/(.*)$ /$1 break;
    proxy_pass $data_upstream;
    proxy_set_header X-Forwarded-Prefix /data;
}