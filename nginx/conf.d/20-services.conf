location = /health {
  add_header Content-Type text/plain;
  return 200 "ok\n";
}

# Prefixes are stripped before forwarding to backend services.
location /api/ {
  set $api_upstream http://mspr_api:3000;
  include /etc/nginx/snippets/proxy_headers.conf;
  rewrite ^/api/?(.*)$ /$1 break;
  proxy_pass $api_upstream;
}

location /tracking/ {
  set $tracking_upstream http://mspr_tracking:3000;
  include /etc/nginx/snippets/proxy_headers.conf;
  rewrite ^/tracking/?(.*)$ /$1 break;
  proxy_pass $tracking_upstream;
}

location /data/ {
  set $data_upstream http://mspr_data:3000;
  include /etc/nginx/snippets/proxy_headers.conf;
  rewrite ^/data/?(.*)$ /$1 break;
  proxy_pass $data_upstream;
}

# Optional frontend placeholders:
