# MinIO S3 API — serves post media to clients via presigned GET URLs.
#
# Path-style addressing puts the bucket as the first path segment, so MinIO is
# exposed at the apex bucket path (/healthbook/...). The path must be proxied
# AS-IS: a SigV4 presigned URL is signed over the exact path + host + query the
# client requests, so any rewrite (or a prefix before the bucket) would yield
# SignatureDoesNotMatch / NoSuchBucket. Host is preserved so the signature the
# client computed against the public host validates at MinIO.
#
# The bucket is private: unsigned or tampered requests get AccessDenied, so
# exposing this path is safe.
location /healthbook/ {
    proxy_http_version 1.1;
    proxy_set_header Host $http_host;

    # Runtime DNS so nginx still boots when MinIO (deep-data profile) is absent.
    set $minio_host minio:9000;
    proxy_pass http://$minio_host$request_uri;

    # Media objects can be large; stream rather than buffer in nginx.
    proxy_buffering off;
}
